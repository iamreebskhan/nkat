# Secret doctor — manually-triggered, SAFE diagnostic for the
# ANTHROPIC_API_KEY / OPENAI_API_KEY Actions secrets.
#
# Prints ONLY non-sensitive facts (length, known public prefix,
# whitespace flag) and the live API HTTP status. Never echoes the key.
#
# Run: Actions tab → "secret doctor" → Run workflow.
name: secret doctor

on:
  workflow_dispatch:

jobs:
  doctor:
    name: inspect API-key secrets (safe)
    runs-on: ubuntu-latest
    steps:
      - name: Anthropic key
        env:
          K: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$K" ]; then echo "ANTHROPIC_API_KEY: NOT SET in this repo's Actions secrets"; exit 0; fi
          LEN=${#K}
          TRIM="$(printf '%s' "$K" | tr -d '[:space:]')"
          echo "ANTHROPIC_API_KEY length        : $LEN"
          echo "  starts with 'sk-ant-'         : $(case "$K" in sk-ant-*) echo yes;; *) echo NO;; esac)"
          echo "  has whitespace/newline        : $([ "${#TRIM}" -ne "$LEN" ] && echo 'YES — this breaks auth' || echo no)"
          echo "  length after trimming         : ${#TRIM}"
          CODE=$(curl -sS -o /tmp/a.json -w '%{http_code}' https://api.anthropic.com/v1/messages \
            -H "x-api-key: $K" -H "anthropic-version: 2023-06-01" -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5","max_tokens":1,"messages":[{"role":"user","content":"hi"}]}' || echo 000)
          echo "  live Anthropic HTTP status    : $CODE  (200/400=key OK, 401=key rejected)"
          [ "$CODE" = "401" ] && echo "  → $(jq -r '.error.message' /tmp/a.json 2>/dev/null)"
          # Also test the TRIMMED key — if trimmed works but raw doesn't, it's a whitespace problem.
          if [ "${#TRIM}" -ne "$LEN" ]; then
            C2=$(curl -sS -o /dev/null -w '%{http_code}' https://api.anthropic.com/v1/messages \
              -H "x-api-key: $TRIM" -H "anthropic-version: 2023-06-01" -H "content-type: application/json" \
              -d '{"model":"claude-haiku-4-5","max_tokens":1,"messages":[{"role":"user","content":"hi"}]}' || echo 000)
            echo "  TRIMMED key HTTP status       : $C2  (if this is 200/400, the secret just has stray whitespace)"
          fi
      - name: OpenAI key
        env:
          K: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$K" ]; then echo "OPENAI_API_KEY: NOT SET"; exit 0; fi
          LEN=${#K}; TRIM="$(printf '%s' "$K" | tr -d '[:space:]')"
          echo "OPENAI_API_KEY length           : $LEN"
          echo "  starts with 'sk-'             : $(case "$K" in sk-*) echo yes;; *) echo NO;; esac)"
          echo "  has whitespace/newline        : $([ "${#TRIM}" -ne "$LEN" ] && echo 'YES — breaks auth' || echo no)"
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' https://api.openai.com/v1/models \
            -H "Authorization: Bearer $K" || echo 000)
          echo "  live OpenAI HTTP status       : $CODE  (200=key OK, 401=key rejected)"
